<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nebula AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#111;
color:white;
height:100vh;
display:flex;
overflow:hidden;

}


/* Sidebar */

.sidebar{

width:260px;
background:#181818;
border-right:2px solid #2d2d2d;
padding:20px;
display:flex;
flex-direction:column;

}

.logo{

font-size:32px;
font-weight:bold;
margin-bottom:30px;
text-align:center;

}

.newChat{

background:white;
color:black;
border:none;
padding:15px;
border-radius:18px;
cursor:pointer;
font-size:16px;
transition:.25s;

}

.newChat:hover{

transform:scale(1.03);
background:#ddd;

}

.history{

margin-top:30px;
overflow-y:auto;
flex:1;

}

.history div{

background:#242424;
padding:12px;
border-radius:15px;
margin-bottom:12px;
cursor:pointer;
transition:.25s;

}

.history div:hover{

background:#333;

}



/* Main */

.main{

flex:1;
display:flex;
flex-direction:column;

}

.header{

padding:30px;
text-align:center;
border-bottom:2px solid #2b2b2b;

}

.header h1{

font-size:50px;

}

.subtitle{

color:#888;
margin-top:10px;

}



/* Chat */

.chat{

flex:1;
overflow-y:auto;
padding:35px;

display:flex;
flex-direction:column;

gap:18px;

}



.message{

max-width:70%;
padding:18px;
border-radius:22px;
line-height:1.5;
animation:fade .25s ease;

word-wrap:break-word;

}

.user{

align-self:flex-end;
background:#444;

}

.bot{

align-self:flex-start;
background:#262626;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(10px);

}

to{

opacity:1;
transform:translateY(0);

}

}



/* Thinking */

.thinking{

color:#888;
font-style:italic;

}



/* Input */

.bottom{

padding:25px;
border-top:2px solid #2b2b2b;

display:flex;
gap:15px;

}

input{

flex:1;

padding:18px;

border:none;

outline:none;

border-radius:22px;

background:#222;

color:white;

font-size:17px;

}

button{

padding:18px 30px;

border:none;

border-radius:22px;

background:white;

color:black;

font-size:16px;

cursor:pointer;

transition:.25s;

}

button:hover{

transform:scale(1.05);

background:#ddd;

}


/* Scrollbar */

::-webkit-scrollbar{

width:8px;

}

::-webkit-scrollbar-thumb{

background:#333;
border-radius:20px;

}

</style>

</head>

<body>



<div class="sidebar">

<div class="logo">

🌌 Nebula

</div>

<button class="newChat" onclick="newChat()">

+ New Chat

</button>

<div class="history" id="history">

<div>Today's Chat</div>

</div>

</div>



<div class="main">

<div class="header">

<h1>Nebula AI</h1>

<div class="subtitle">

Powered by Ollama

</div>

</div>



<div class="chat" id="chat">

<div class="message bot">

👋 Hello! I'm Nebula AI.

Ask me anything.

</div>
</div>

</div>


<div class="bottom">

<input
id="input"
type="text"
placeholder="Message Nebula..."
autocomplete="off"
>

<button onclick="sendMessage()">

Send

</button>

</div>


</div>



<script>

const chat = document.getElementById("chat");

const input = document.getElementById("input");



async function sendMessage(){

const text = input.value.trim();

if(text === "") return;



chat.innerHTML += `

<div class="message user">

${text}

</div>

`;



chat.scrollTop = chat.scrollHeight;

input.value = "";



const thinking = document.createElement("div");

thinking.className = "message bot thinking";

thinking.id = "thinking";

thinking.innerHTML = "🌌 Nebula is thinking...";

chat.appendChild(thinking);

chat.scrollTop = chat.scrollHeight;



try{

const response = await fetch("/chat",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

message:text

})

});


const data = await response.json();



thinking.remove();



chat.innerHTML += `

<div class="message bot">

${data.reply}

</div>

`;
    chat.scrollTop = chat.scrollHeight;

}
catch(error){

    thinking.remove();

    chat.innerHTML += `

    <div class="message bot">

    ⚠️ Sorry, I couldn't reach Ollama.

    Make sure Flask and Ollama are running.

    </div>

    `;

    chat.scrollTop = chat.scrollHeight;

}

}



input.addEventListener("keydown",function(event){

    if(event.key === "Enter"){

        event.preventDefault();

        sendMessage();

    }

});



function newChat(){

    chat.innerHTML = `

    <div class="message bot">

    👋 Hello! I'm Nebula AI.

    Ask me anything.

    </div>

    `;

}
</script>

</body>

</html>
